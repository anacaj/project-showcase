<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Skincare Routine | Premium Experience</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <style>
    :root {
      --text-main: #111111;
      --text-gray: #828282;
      --text-light: #BDBDBD;
      --beige-bg: #F7F6F3; /* Bege super claro e premium */
      --btn-border: #E5E5E5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: #000;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; font-family: 'Inter', sans-serif;
      overflow: hidden; color: var(--text-main);
    }

    .app-container {
      width: 100%; height: 100vh; max-width: 430px; max-height: 932px;
      position: relative; overflow: hidden; 
      background-color: var(--beige-bg);
    }
    @media (min-width: 500px) {
      .app-container { border: 12px solid #1a1a1a; border-radius: 40px; height: 812px; box-shadow: 0 50px 100px rgba(0,0,0,0.9); }
    }

    /* =========================================
       TELA DO QUIZ (PREMIUM MINIMALISTA)
       ========================================= */
    #quiz-view {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--beige-bg); display: flex; flex-direction: column;
      padding: 30px 25px 40px; z-index: 300; transition: opacity 0.5s ease;
    }
    
    .quiz-top-nav { display: flex; align-items: center; margin-bottom: 25px; height: 30px; }
    .btn-back-arrow { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; margin-left: -10px; }
    
    .progress-bar { width: 100%; height: 3px; background: #E5E5E5; margin-bottom: 20px; }
    .progress-fill { height: 100%; background: var(--text-main); width: 0%; transition: width 0.4s ease; }
    .step-counter { font-size: 11px; font-weight: 600; color: var(--text-gray); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 20px; display: block; }
    
    .question-title { font-size: 24px; font-weight: 500; line-height: 1.3; margin-bottom: 10px; color: var(--text-main); }
    .question-subtitle { font-size: 13px; color: var(--text-gray); margin-bottom: 35px; min-height: 15px; }
    
    .options-list { display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; padding-bottom: 20px; }
    
    .option-btn {
      background: #FFFFFF; border: 1px solid var(--btn-border); color: var(--text-main); text-align: left;
      padding: 20px; border-radius: 14px; font-size: 15px; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 15px rgba(0,0,0,0.01);
    }
    .option-btn.selected { border-color: var(--text-main); background: #FAFAFA; }

    /* Estilo do Radio/Checkbox igual ao print */
    .circle-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--text-light); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .option-btn.selected .circle-check { border-color: var(--text-main); }
    .option-btn.selected .circle-check::after { content: ''; width: 10px; height: 10px; background: var(--text-main); border-radius: 50%; }

    .quiz-footer { margin-top: auto; padding-top: 10px; }
    .btn-next {
      width: 100%; padding: 18px; border-radius: 100px; font-size: 15px; font-weight: 600; 
      background: var(--text-gray); color: #FFF; border: none; cursor: not-allowed; transition: 0.3s;
    }
    .btn-next.active { background: var(--text-main); cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .btn-next:active { transform: scale(0.98); }

    /* =========================================
       TELA DE LOADING
       ========================================= */
    #loading-view {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--beige-bg); color: var(--text-main); display: none; flex-direction: column;
      align-items: center; justify-content: center; z-index: 300;
    }
    .spinner { width: 40px; height: 40px; border: 2px solid rgba(0,0,0,0.05); border-top-color: var(--text-main); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 25px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* =========================================
       TELA DE RESULTADOS (CORRIGIDA)
       ========================================= */
    #result-view {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-color: var(--beige-bg); display: none; flex-direction: column; z-index: 200;
    }
    
    /* A Aura colorida fica APENAS atrás do produto agora */
    .bg-aura {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 300px; height: 300px; border-radius: 50%;
      filter: blur(80px); z-index: 0; opacity: 0.4;
      background: radial-gradient(circle, #E5E5E5 0%, transparent 70%);
      transition: background 1.5s ease; pointer-events: none;
    }

    .global-header { position: absolute; top: 45px; width: 100%; padding: 0 25px; display: flex; justify-content: center; align-items: center; z-index: 100; }
    .step-indicator { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--text-main); background: rgba(255,255,255,0.6); padding: 8px 18px; border-radius: 30px; backdrop-filter: blur(10px); }
    .cart-mini { position: absolute; right: 25px; background: white; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }
    .cart-badge { position: absolute; top: -3px; right: -3px; background: var(--text-main); color: white; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: 700; }
    
    .swiper { width: 100%; height: 100%; z-index: 10; }
    .swiper-slide { display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 120px 24px 50px; }
    
    .title-group { text-align: center; z-index: 50; }
    .title-group h1 { font-size: 26px; font-weight: 500; color: var(--text-main); letter-spacing: -0.5px; margin-bottom: 6px; }
    .title-group .brand { font-size: 11px; font-weight: 600; color: var(--text-gray); text-transform: uppercase; letter-spacing: 2px; }
    
    .img-container { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; z-index: 20; }
    .product-img { width: 65%; height: auto; object-fit: contain; transform: scale(3.5) translateY(-15px); filter: drop-shadow(0 30px 40px rgba(0,0,0,0.1)); cursor: pointer; }
    
    .footer-content { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 50; }
    .btn-pill { display: flex; align-items: center; justify-content: center; gap: 10px; background: #FFFFFF; border: none; padding: 16px 35px; border-radius: 100px; font-size: 14px; font-weight: 600; color: var(--text-main); cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.06); transition: transform 0.2s ease; width: 100%; max-width: 280px;}
    .btn-pill:active { transform: scale(0.96); }
    
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(247, 246, 243, 0.98); backdrop-filter: blur(20px); z-index: 400; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
    .overlay.active { transform: translateY(0); }
    .overlay-header { display: flex; align-items: center; justify-content: center; padding: 45px 25px 25px; position: relative; }
    .btn-close { position: absolute; left: 25px; background: none; border: none; font-size: 12px; font-weight: 600; color: var(--text-gray); text-transform: uppercase; cursor: pointer; }
    .overlay h2 { font-size: 26px; font-weight: 500; color: var(--text-main); margin-bottom: 25px; text-align: center; }
    .overlay h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-gray); margin-bottom: 8px; font-weight: 600; }
    .overlay p { font-size: 15px; line-height: 1.6; color: #444; margin-bottom: 25px; font-weight: 400; }
    .bag-list { flex: 1; overflow-y: auto; padding: 0 25px; }
    .bag-item { display: flex; align-items: center; gap: 15px; padding: 15px; background: white; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--btn-border); }
    .bag-item-num { font-size: 11px; font-weight: 700; color: #111; width: 24px; height: 24px; background: #F0F0F0; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- FASE 1: QUIZ -->
    <div id="quiz-view">
      <div class="quiz-top-nav">
        <button class="btn-back-arrow" id="btn-prev" onclick="goPrev()" style="visibility: hidden;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
      </div>

      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <span class="step-counter"><span id="step-count">1</span> DE 9</span>
      
      <div class="question-title" id="q-title"></div>
      <div class="question-subtitle" id="q-subtitle"></div>
      
      <div class="options-list" id="q-options"></div>

      <div class="quiz-footer">
        <button class="btn-next" id="btn-next" onclick="goNext()">Avançar</button>
      </div>
    </div>

    <!-- FASE 2: LOADING -->
    <div id="loading-view">
      <div class="spinner"></div>
      <p style="font-size: 14px; font-weight: 500; letter-spacing: 1px; color: #666;">Desenvolvendo sua rotina...</p>
    </div>

    <!-- FASE 3: RESULTADOS -->
    <div id="result-view">
      <div class="bg-aura" id="aura"></div>

      <div class="global-header">
        <div class="step-indicator" id="step-text">1º PASSO</div>
        <div class="cart-mini" onclick="openBag()">
          <div class="cart-badge" id="cart-badge">0</div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        </div>
      </div>

      <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="wrapper"></div>
      </div>

      <canvas id="colorCanvas" style="display:none;"></canvas>
    </div>

    <!-- OVERLAYS -->
    <div class="overlay" id="detail-overlay">
      <div class="overlay-header"><button class="btn-close" onclick="closeDetails()">✕ Fechar</button></div>
      <div style="padding: 0 30px;">
        <h2 id="d-title"></h2>
        <h4>O que é</h4><p id="d-what"></p>
        <h4>Como usar</h4><p id="d-how"></p>
        <button class="btn-pill" id="btn-add-detail" style="background:#111; color:#fff; margin-top:20px;">Adicionar à rotina</button>
      </div>
    </div>

    <div class="overlay" id="bag-overlay">
      <div class="overlay-header"><button class="btn-close" onclick="closeBag()">✕ Fechar</button><div style="font-size:16px; font-weight:500; color:#111;">Minha Rotina</div></div>
      <div class="bag-list" id="bag-list"></div>
      <div style="padding: 25px; display: flex; justify-content: center; width: 100%;">
  <button class="btn-pill" style="background:#111; color:#fff; width: 100%; max-width: 320px; font-size: 15px; padding: 18px;" onclick="alert('Indo para o Checkout...')">
    Finalizar Compra
  </button>
</div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  
  <script>
    const BANCO_DE_PRODUTOS = [
      { id: 101, name: "Centella Cleansing Oil", brand: "SKIN1004", passo: "Limpeza", tipo_pele: ["Oleosa", "Mista", "Normal", "Seca"], condicoes: ["Acne", "Poros"], img: "https://www.skin1004.com/cdn/shop/files/skin1004-cleanser-200ml-madagascar-centella-light-cleansing-oil-1204112613_1440x.png?v=1762764548", what: "Óleo de limpeza leve que remove maquiagem e sebo sem obstruir poros.", how: "Massageie no rosto seco, emulsione com água e enxágue." },
      { id: 102, name: "Hyaluronic Cleansing Foam", brand: "Isntree", passo: "Limpeza", tipo_pele: ["Seca", "Normal", "Sensível", "Todos"], condicoes: ["Desidratação", "Sensibilidade"], img: "https://isntree.com/web/product/big/202302/c4f2e96d99676e1a7b458b9f1d2e53cc.png", what: "Espuma cremosa e hidratante que limpa sem repuxar.", how: "Faça espuma com água e massageie o rosto úmido." },
      
      { id: 201, name: "Pore+ Dark Spot Pads", brand: "Celimax", passo: "Tônico", tipo_pele: ["Oleosa", "Mista", "Normal"], condicoes: ["Manchas", "Poros", "Acne"], img: "https://celimaxglobal.com/cdn/shop/products/Celimax_Pore_Dark_Spot_Pad_01_1024x1024.png", what: "Almofadas tônicas clareadoras e refinadoras de poros.", how: "Passe o lado texturizado e depois o lado liso no rosto limpo." },
      { id: 202, name: "Centella Toning Toner", brand: "SKIN1004", passo: "Tônico", tipo_pele: ["Sensível", "Seca", "Todos"], condicoes: ["Sensibilidade", "Desidratação"], img: "https://www.skin1004.com/cdn/shop/files/skin1004-toner-210ml-madagascar-centella-toning-toner-1204112571_1440x.png?v=1762764547", what: "Tônico calmante com Centella Asiática e PHA para esfoliação leve.", how: "Aplique com as mãos ou algodão dando batidinhas." },

      { id: 301, name: "Poremizing Fresh Ampoule", brand: "SKIN1004", passo: "Tratamento", tipo_pele: ["Oleosa", "Mista"], condicoes: ["Poros", "Acne"], img: "https://www.skin1004.com/cdn/shop/products/skin1004-ampoule-serum-100ml-poremizing-fresh-ampoule-38642870780150.png?v=1677149786", what: "Ampola de sal rosa que minimiza a aparência dos poros.", how: "Aplique 3 gotas após o tônico." },
      { id: 302, name: "Vita C Dark Spot", brand: "Goodal", passo: "Tratamento", tipo_pele: ["Todos"], condicoes: ["Manchas", "Envelhecimento"], img: "https://cdn.shopify.com/s/files/1/0249/1218/products/goodal-green-tangerine-vita-c-dark-spot-serum-30ml-1.png", what: "Sérum de vitamina C concentrado para clarear e iluminar.", how: "Espalhe pelo rosto evitando a área dos olhos." },
      { id: 303, name: "Peptide 500", brand: "Mizon", passo: "Tratamento", tipo_pele: ["Seca", "Normal"], condicoes: ["Envelhecimento", "Desidratação"], img: "https://cdn.shopify.com/s/files/1/0249/1218/products/mizon-peptide-500-1.png", what: "Soro focado em elasticidade e redução de linhas finas.", how: "Aplique na pele focando nas áreas com linhas." },

      { id: 401, name: "Centella Soothing Cream", brand: "SKIN1004", passo: "Hidratação", tipo_pele: ["Oleosa", "Mista", "Todos"], condicoes: ["Acne", "Sensibilidade"], img: "https://www.skin1004.com/cdn/shop/files/skin1004-75ml-madagascar-centella-soothing-cream-1204112523_1440x.png", what: "Creme em gel translúcido que hidrata e acalma instantaneamente.", how: "Aplique no rosto como penúltimo passo da rotina." },
      { id: 402, name: "Hyaluronic Acid Moist", brand: "Isntree", passo: "Hidratação", tipo_pele: ["Seca", "Normal"], condicoes: ["Desidratação", "Envelhecimento"], img: "https://isntree.com/web/product/big/202302/10b9f5a0c3b06e8b408b04a919f91a0c.png", what: "Creme rico para selar a hidratação e recuperar a barreira.", how: "Espalhe uniformemente massageando até absorver." },

      { id: 501, name: "Hyalu-Cica Water-Fit Sun", brand: "SKIN1004", passo: "Proteção", tipo_pele: ["Todos"], condicoes: ["Desidratação", "Manchas", "Envelhecimento"], img: "https://www.skin1004.com/cdn/shop/files/skin1004-50ml-hyalu-cica-water-fit-sun-serum-uv-1204112543_1440x.png?v=1762764544", what: "Protetor solar químico ultra-leve que parece um sérum.", how: "Aplique dois dedos do produto por todo rosto e pescoço pela manhã." }
    ];

    const perguntas = [
      { q: "Com que frequência sua pele apresenta brilho excessivo?", multi: false,
        options: [ 
          { text: "Sempre", points: { pele_oleosa: 3 } }, 
          { text: "Às vezes (Zona T)", points: { pele_mista: 3 } }, 
          { text: "Raramente", points: { pele_normal: 2 } }, 
          { text: "Nunca (Fica opaca)", points: { pele_seca: 3 } } 
        ] 
      },
      { q: "Após lavar o rosto, como sua pele se sente?", multi: false,
        options: [ 
          { text: "Oleosa rapidamente", points: { pele_oleosa: 2 } }, 
          { text: "Repuxada e seca", points: { pele_seca: 3, desidratacao: 1 } }, 
          { text: "Oleosa na zona T, seca no resto", points: { pele_mista: 2 } }, 
          { text: "Confortável", points: { pele_normal: 2 } } 
        ] 
      },
      { q: "Com que frequência você tem espinhas ou cravos?", multi: false,
        options: [ 
          { text: "Frequentemente", points: { acne: 3 } }, 
          { text: "Apenas em períodos específicos", points: { acne: 1 } }, 
          { text: "Quase nunca", points: {} } 
        ] 
      },
      { q: "Você possui manchas escuras ou sardas que te incomodam?", multi: false,
        options: [ 
          { text: "Sim, bastante", points: { manchas: 3 } }, 
          { text: "Poucas", points: { manchas: 1 } }, 
          { text: "Não", points: {} } 
        ] 
      },
      { q: "Sua pele reage facilmente a produtos novos, ficando vermelha?", multi: false,
        options: [ 
          { text: "Sempre reage", points: { sensibilidade: 3 } }, 
          { text: "Às vezes", points: { sensibilidade: 1 } }, 
          { text: "Quase nunca", points: {} } 
        ] 
      },
      { q: "Você percebe linhas finas, rugas ou perda de firmeza?", multi: false,
        options: [ 
          { text: "Sim, me incomoda", points: { envelhecimento: 3 } }, 
          { text: "Estão começando a aparecer", points: { envelhecimento: 1 } }, 
          { text: "Ainda não percebo", points: {} } 
        ] 
      },
      { q: "Como estão os seus poros?", multi: false,
        options: [ 
          { text: "Muito visíveis no rosto todo", points: { poros: 3 } }, 
          { text: "Visíveis no nariz e bochechas", points: { poros: 1 } }, 
          { text: "Pouco visíveis", points: {} } 
        ] 
      },
      // --- QUESTÃO 8 ATUALIZADA (Mais abrangente) ---
      { q: "Selecione tudo que te incomoda HOJE na sua pele:", multi: true, subtitle: "Pode selecionar mais de uma opção",
        options: [ 
          { text: "Acne e espinhas ativas", points: { acne: 3 } }, 
          { text: "Marcas escuras pós-acne", points: { manchas: 2, acne: 1 } }, 
          { text: "Manchas de sol, idade ou melasma", points: { manchas: 3 } }, 
          { text: "Poros dilatados e textura irregular", points: { poros: 3 } }, 
          { text: "Excesso de oleosidade e brilho", points: { pele_oleosa: 2, poros: 1 } }, 
          { text: "Pele ressecada, repuxando ou descamando", points: { desidratacao: 3, pele_seca: 1 } }, 
          { text: "Vermelhidão, ardor ou pele sensível", points: { sensibilidade: 3 } }, 
          { text: "Linhas finas e rugas", points: { envelhecimento: 3 } }, 
          { text: "Perda de firmeza e flacidez", points: { envelhecimento: 2 } }, 
          { text: "Pele opaca, cansada e sem viço", points: { desidratacao: 1, manchas: 1 } } 
        ] 
      },
      { q: "Qual o seu PRINCIPAL objetivo com a rotina de hoje?", multi: true, subtitle: "Selecione o que for mais importante para você (Pode ser mais de um)",
        options: [ 
          { text: "Tratar espinhas e oleosidade", special_val: "Acne" }, 
          { text: "Clarear manchas e iluminar", special_val: "Manchas" }, 
          { text: "Anti-idade e firmeza", special_val: "Envelhecimento" }, 
          { text: "Hidratar e recuperar a pele", special_val: "Desidratação" }, 
          { text: "Acalmar vermelhidão", special_val: "Sensibilidade" } 
        ] 
      }
    ];

    let currentQ = 0;
    let userAnswers = {}; 

    function renderQuiz() {
      const qData = perguntas[currentQ];
      
      document.getElementById('step-count').innerText = currentQ + 1;
      document.getElementById('progress').style.width = `${((currentQ + 1) / perguntas.length) * 100}%`;
      document.getElementById('q-title').innerText = qData.q;
      document.getElementById('q-subtitle').innerText = qData.subtitle || "";
      
      const savedAnswers = userAnswers[currentQ] || [];

      const optionsHtml = qData.options.map((opt, index) => {
        const isSelected = savedAnswers.includes(index);
        return `
          <button class="option-btn ${isSelected ? 'selected' : ''}" onclick="toggleOption(${index})">
            ${opt.text}
            <div class="circle-check"></div>
          </button>
        `;
      }).join('');
      
      document.getElementById('q-options').innerHTML = optionsHtml;

      document.getElementById('btn-prev').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
      
      const btnNext = document.getElementById('btn-next');
      btnNext.innerText = currentQ === perguntas.length - 1 ? "Finalizar Análise" : "Avançar";
      
      if (savedAnswers.length > 0) {
        btnNext.classList.add('active');
        btnNext.disabled = false;
      } else {
        btnNext.classList.remove('active');
        btnNext.disabled = true;
      }
    }

    function toggleOption(index) {
      const isMulti = perguntas[currentQ].multi;
      if (!userAnswers[currentQ]) userAnswers[currentQ] = [];

      if (isMulti) {
        const pos = userAnswers[currentQ].indexOf(index);
        if (pos > -1) userAnswers[currentQ].splice(pos, 1);
        else userAnswers[currentQ].push(index);
      } else {
        userAnswers[currentQ] = [index];
      }
      renderQuiz();
    }

    function goNext() {
      if (!userAnswers[currentQ] || userAnswers[currentQ].length === 0) return;
      if (currentQ < perguntas.length - 1) { currentQ++; renderQuiz(); }
      else { calcularResultadoFinal(); }
    }

    function goPrev() {
      if (currentQ > 0) { currentQ--; renderQuiz(); }
    }

    let finalRoutine = [];

    function calcularResultadoFinal() {
      document.getElementById('quiz-view').style.opacity = 0;
      setTimeout(() => {
        document.getElementById('quiz-view').style.display = 'none';
        document.getElementById('loading-view').style.display = 'flex';
      }, 500);

      let scores = { pele_oleosa:0, pele_seca:0, pele_mista:0, pele_normal:0, acne:0, manchas:0, sensibilidade:0, desidratacao:0, envelhecimento:0, poros:0 };
      let prioridades = [];

      for (let qIndex in userAnswers) {
        let selecionados = userAnswers[qIndex];
        selecionados.forEach(optIndex => {
          let opt = perguntas[qIndex].options[optIndex];
          if (opt.points) {
            for (let key in opt.points) scores[key] += opt.points[key];
          }
          if (opt.special_val) prioridades.push(opt.special_val);
        });
      }

      let tipos = [ { id: "Oleosa", s: scores.pele_oleosa }, { id: "Seca", s: scores.pele_seca }, { id: "Mista", s: scores.pele_mista }, { id: "Normal", s: scores.pele_normal } ];
      let tipoVencedor = tipos.sort((a,b) => b.s - a.s)[0].id;

      let dores = [ { id:"Acne", s:scores.acne }, { id:"Manchas", s:scores.manchas }, { id:"Sensibilidade", s:scores.sensibilidade }, { id:"Desidratação", s:scores.desidratacao }, { id:"Envelhecimento", s:scores.envelhecimento }, { id:"Poros", s:scores.poros } ];
      let condicoesUsuario = dores.filter(d => d.s >= 1).sort((a,b) => b.s - a.s).slice(0, 3).map(d => d.id);
      
      prioridades.forEach(p => { if (!condicoesUsuario.includes(p)) condicoesUsuario.unshift(p); });

      const ORDEM_PASSOS = ["Limpeza", "Tônico", "Tratamento", "Hidratação", "Proteção"];
      finalRoutine = [];

      ORDEM_PASSOS.forEach(passo => {
        let prodsDoPasso = BANCO_DE_PRODUTOS.filter(p => p.passo === passo);
        let prodsCompativeis = prodsDoPasso.filter(p => p.tipo_pele.includes(tipoVencedor) || p.tipo_pele.includes("Todos"));
        let ideal = prodsCompativeis.find(p => p.condicoes.some(c => condicoesUsuario.includes(c))) || prodsCompativeis[0];
        if (ideal) finalRoutine.push(ideal);
      });

      setTimeout(() => {
        document.getElementById('loading-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'flex';
        renderizarSwiper();
      }, 2500);
    }

    let cart = [];

    function renderizarSwiper() {
      const wrapper = document.getElementById('wrapper');
      
      wrapper.innerHTML = finalRoutine.map((p, i) => `
        <div class="swiper-slide">
          <div class="title-group">
            <h1>${p.name}</h1>
            <div class="brand">${p.brand} | ${p.passo}</div>
          </div>
          <div class="img-container">
            <img src="${p.img}" id="img-prod-${i}" class="product-img" crossorigin="anonymous" onclick="openDetails(${i})">
          </div>
          <div class="footer-content">
            <button class="btn-pill" onclick="add(${i})">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
              Adicionar à rotina
            </button>
          </div>
        </div>`).join('');
      
      const swiper = new Swiper(".mySwiper", {
        direction: "vertical", speed: 800,
        on: { slideChangeTransitionEnd: function() { 
          updateTheme(this.activeIndex);
          document.getElementById('step-text').innerText = (this.activeIndex + 1) + "º PASSO";
        }}
      });
      setTimeout(() => updateTheme(0), 600);
    }

    function updateTheme(index) {
      const img = document.getElementById(`img-prod-${index}`);
      const aura = document.getElementById('aura');
      const canvas = document.getElementById('colorCanvas');
      const ctx = canvas.getContext('2d');

      try {
        ctx.drawImage(img, 0, 0, 10, 10);
        const data = ctx.getImageData(0, 0, 10, 10).data;
        let r=0, g=0, b=0, count=0;
        
        for (let i=0; i<data.length; i+=4) { 
          // Ignora pixels muito escuros ou transparentes para não sujar a cor
          if(data[i+3] > 100 && (data[i] > 50 || data[i+1] > 50 || data[i+2] > 50)) {
            r+=data[i]; g+=data[i+1]; b+=data[i+2]; count++;
          }
        }
        
        if (count > 0) {
          r = Math.floor(r/count); g = Math.floor(g/count); b = Math.floor(b/count);
          // Aplica APENAS no brilho de fundo (Aura), deixando o resto da tela Bege limpo
          aura.style.background = `radial-gradient(circle, rgba(${r},${g},${b}, 0.5) 0%, transparent 70%)`;
        }
      } catch (e) {
        aura.style.background = `radial-gradient(circle, rgba(200,200,200, 0.3) 0%, transparent 70%)`;
      }
    }

    function add(i) {
      const p = finalRoutine[i];
      if(!cart.find(item => item.id === p.id)) {
        cart.push({...p, step: i + 1});
        document.getElementById('cart-badge').innerText = cart.length;
        document.getElementById('cart-badge').style.display = 'flex';
      }
    }

    function openDetails(i) {
      const p = finalRoutine[i];
      document.getElementById('d-title').innerText = p.name;
      document.getElementById('d-what').innerText = p.what;
      document.getElementById('d-how').innerText = p.how;
      document.getElementById('btn-add-detail').onclick = () => { add(i); closeDetails(); };
      document.getElementById('detail-overlay').classList.add('active');
    }
    
    function closeDetails() { document.getElementById('detail-overlay').classList.remove('active'); }
    
    function openBag() {
      const list = document.getElementById('bag-list');
      list.innerHTML = cart.length === 0 ? '<div style="text-align:center; padding-top:50px; color:#999;">Sua rotina está vazia</div>' : '';
      cart.forEach(item => {
        list.innerHTML += `
          <div class="bag-item">
            <div class="bag-item-num">${item.step}</div>
            <div style="flex:1;"><h5>${item.name}</h5><div style="font-size:11px; color:#888">${item.passo}</div></div>
            <div style="color:#CCC; cursor:pointer; font-size:16px;" onclick="remove(${item.id})">✕</div>
          </div>`;
      });
      document.getElementById('bag-overlay').classList.add('active');
    }
    
    function closeBag() { document.getElementById('bag-overlay').classList.remove('active'); }
    function remove(id) { cart = cart.filter(i => i.id !== id); openBag(); document.getElementById('cart-badge').innerText = cart.length || 0; if(cart.length===0) document.getElementById('cart-badge').style.display='none'; }

    window.onload = renderQuiz;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ana Clara | UI/UX Architect</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #d4cfc7; --bg: #0f0f0f; }
        body { background-color: var(--bg); color: #f5f5f5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .serif { font-family: 'Instrument Serif', serif; }
        
        /* Bento Card Styling */
        .bento-card { 
            background: #000; 
            border-radius: 40px; 
            overflow: hidden; 
            position: relative; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            height: 600px; 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .bento-card:hover { transform: translateY(-8px); border-color: rgba(255,255,255,0.15); }
        
        /* Image Handling */
        .bento-img { 
            position: absolute; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.5; 
            transition: 0.8s ease; 
        }
        .bento-card:hover .bento-img { opacity: 0.8; transform: scale(1.03); }
        
        /* Overlay & Text Protection */
        .bento-overlay { 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.2) 60%, transparent 100%); 
            padding: 3rem; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            z-index: 10;
        }

        /* Modal Styling */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 999; 
            background: rgba(0,0,0,0.98); 
            backdrop-filter: blur(20px); 
            padding: 2rem; 
            overflow-y: auto; 
        }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        
        .modal-content {
            max-width: 800px;
            width: 100%;
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 3.5rem;
            border-radius: 48px;
        }

        .mono { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="py-32 px-6 md:px-20 border-b border-white/5">
        <p class="mono opacity-40 mb-4">Portfolio // 2026</p>
        <h1 class="text-7xl md:text-[9rem] serif italic text-white leading-[0.8] tracking-tighter">Digital Architect</h1>
        <p class="text-zinc-500 text-xl mt-10 max-w-sm font-light">
            Crafting <span class="text-white italic">high-end experiences</span> for global partnerships.
        </p>
    </header>

    <section class="py-24 px-6 md:px-20 max-w-[1400px] mx-auto grid grid-cols-1 md:grid-cols-12 gap-8">
        
        <div class="md:col-span-12 bento-card bg-black h-[700px]">
            <img src="skincare.png" class="bento-img" alt="Skincare App Mockup">
            <div class="bento-overlay">
                <p class="mono text-accent mb-4">Mobile Experience // JS ES6</p>
                <h3 class="text-6xl serif italic text-white mb-8">Skincare Routine</h3>
                <a href="skincare-routine.html" class="inline-block bg-white text-black px-10 py-5 rounded-full font-bold uppercase text-[10px] tracking-widest hover:bg-zinc-200 transition">Launch App →</a>
            </div>
        </div>

        <div class="md:col-span-6 bento-card">
            <img src="xiaomi.png" class="bento-img" alt="Xiaomi UI Design">
            <div class="bento-overlay">
                <p class="mono text-accent mb-4">UI Case Study</p>
                <h4 class="text-4xl serif italic text-white mb-6">Xiaomi Soundbar Pro</h4>
                <button onclick="openModal('m-xiaomi')" class="text-zinc-400 underline mono text-[9px] hover:text-white transition">Read Narrative</button>
            </div>
        </div>

        <div class="md:col-span-6 bento-card">
            <img src="mario.png" class="bento-img" alt="Mario Wonder UI">
            <div class="bento-overlay">
                <p class="mono text-accent mb-4">Visual Storytelling</p>
                <h4 class="text-4xl serif italic text-white mb-6">Super Mario Wonder</h4>
                <button onclick="openModal('m-mario')" class="text-zinc-400 underline mono text-[9px] hover:text-white transition">Read Narrative</button>
            </div>
        </div>

        <div class="md:col-span-12 bento-card h-[550px]">
            <img src="luigi.png" class="bento-img" alt="Luigi's Mansion UI">
